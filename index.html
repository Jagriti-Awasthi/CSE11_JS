<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Student Result Calculator</h1>
        <label for="subjects">Number of Subjects:</label>
        <input type="number" id="subjects" min="1" placeholder="Enter number of subjects">
        <button onclick="calculateResult()">Calculate Result</button>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
